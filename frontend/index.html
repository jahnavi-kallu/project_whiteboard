<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Whiteboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-section">
            <i class="fa-solid fa-chalkboard brand-icon"></i>
            <h1>Whiteboard App</h1>
        </div>
        
        <div class="auth-sharing">
            <button id="undoBtn" class="btn btn-outline" title="Undo"><i class="fa-solid fa-rotate-left"></i></button>
            <button id="redoBtn" class="btn btn-outline" title="Redo"><i class="fa-solid fa-rotate-right"></i></button>
            <button id="saveBtn" class="btn btn-outline" title="Save Canvas Layout"><i class="fa-solid fa-download"></i> Save Image</button>
            
            <button id="shareBoardBtn" class="btn btn-outline btn-share" title="Share current board"><i class="fa-solid fa-share-nodes"></i> Share</button>
            
            <button id="authModalBtn" class="btn btn-login"><i class="fa-solid fa-right-to-bracket"></i> Login / Register</button>
            <button id="logoutBtn" class="btn btn-danger" style="display: none;" title="Sign Out"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>
    </header>

    <div class="app-body">
        <div id="dashboardPanel" class="dashboard-panel" >
            <div class="panel-header">
                <h3>My Boards</h3>
                <button id="createNewCanvasBtn" class="btn btn-primary btn-sm"><i class="fa-solid fa-plus"></i> New</button>
            </div>
            <ul id="canvasList" class="canvas-list">
                <li class="empty-msg">No boards found</li>
            </ul>
        </div>

        <aside class="sidebar-tools">
            <div class="tool-section">
                <h3>Tools</h3>
                <button id="toolBrush" class="tool-btn active" title="Free Brush"><i class="fa-solid fa-paint-brush"></i></button>
                <button id="toolEraser" class="tool-btn" title="Eraser"><i class="fa-solid fa-eraser"></i></button>
                <button id="toolLine" class="tool-btn" title="Straight Line"><i class="fa-solid fa-grip-lines-vertical" style="transform: rotate(45deg);"></i></button>
                <button id="toolRect" class="tool-btn" title="Rectangle"><i class="fa-regular fa-square"></i></button>
                <button id="toolCircle" class="tool-btn" title="Circle"><i class="fa-regular fa-circle"></i></button>
            </div>

            <div class="tool-section">
                <h3>Style</h3>
                <div class="style-group">
                    <label for="colorPicker"><i class="fa-solid fa-palette"></i> Color</label>
                    <input type="color" id="colorPicker" value="#4f46e5">
                </div>
                <div class="style-group">
                    <label for="lineWidthRange"><i class="fa-solid fa-sliders"></i> Thickness (<span id="thicknessVal">4</span>px)</label>
                    <input type="range" id="lineWidthRange" min="2" max="30" value="4">
                </div>
            </div>

            <button id="clearBtn" class="btn btn-danger"><i class="fa-solid fa-trash-can"></i> Clear All</button>
        </aside>

        <main class="canvas-container">
            <canvas id="whiteboard"></canvas>
        </main>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-card">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            <div class="modal-tabs">
                <button class="tab-btn active" id="tabLogin">Login</button>
                <button class="tab-btn" id="tabRegister">Register</button>
            </div>
            <form id="loginForm" class="auth-form active">
                <div class="input-group"><label>Email Address</label><input type="email" id="loginEmail" required placeholder="name@example.com"></div>
                <div class="input-group"><label>Password</label><input type="password" id="loginPassword" required placeholder="••••••••"></div>
                <button type="submit" class="btn btn-login form-submit-btn">Sign In</button>
            </form>
            <form id="registerForm" class="auth-form">
                <div class="input-group"><label>Full Name</label><input type="text" id="regName" required placeholder="John Doe"></div>
                <div class="input-group"><label>Email Address</label><input type="email" id="regEmail" required placeholder="name@example.com"></div>
                <div class="input-group"><label>Password</label><input type="password" id="regPassword" required placeholder="Minimum 6 characters"></div>
                <button type="submit" class="btn btn-primary form-submit-btn">Create Account</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="shareModal">
        <div class="modal-card">
            <button class="close-modal" id="closeShareModalBtn">&times;</button>
            <div class="modal-header">
                <h2>Share Project Canvas</h2>
            </div>
            <div class="modal-body" style="margin-top: 15px;">
                <p style="font-size: 14px; color: #666;">Give others access to collaborate live on this frame:</p>
                <div class="share-input-group" style="display: flex; gap: 10px; margin: 10px 0 20px 0;">
                    <input type="email" id="shareEmailInput" placeholder="Enter collaborator's email" style="flex-grow: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px;">
                    <button id="submitShareBtn" class="btn btn-primary" style="padding: 8px 16px;">Invite</button>
                </div>
                <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px;">
                <p style="font-size: 14px; color: #666;">Or copy the direct workspace transmission link:</p>
                <div class="share-link-group" style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="text" id="shareUrlLink" readonly style="flex-grow: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; background: #f5f5f5;">
                    <button id="copyLinkBtn" class="btn btn-outline" style="padding: 8px 12px;"><i class="fa-regular fa-copy"></i> Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
