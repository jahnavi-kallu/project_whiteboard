<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Whiteboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-section">
            <i class="fa-solid fa-chalkboard brand-icon"></i>
            <h1>Whiteboard App</h1>
            <span id="canvasTitle" class="canvas-title-badge" style="display:none;"></span>
        </div>

        <div class="auth-sharing">
            <button id="undoBtn" class="btn btn-outline" title="Undo"><i class="fa-solid fa-rotate-left"></i></button>
            <button id="redoBtn" class="btn btn-outline" title="Redo"><i class="fa-solid fa-rotate-right"></i></button>
            <!-- Opens the My Canvases drawer — hidden until logged in -->
            <button id="myCanvasesBtn" class="btn btn-outline">
                <i class="fa-solid fa-layer-group"></i> My Canvases
            </button>
            <!-- Share Canvas — hidden until logged in -->
            <button id="shareBtn" class="btn btn-outline">
                <i class="fa-solid fa-user-plus"></i> Share
            </button>
            <!-- Save split-button dropdown -->
            <div class="save-dropdown-wrap" id="saveDropdown">
                <button id="saveBtn" class="btn btn-outline save-main-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Save
                    <i class="fa-solid fa-chevron-down save-chevron"></i>
                </button>
                <div class="save-dropdown-menu">
                    <button id="saveCloudBtn" class="save-option">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <div>
                            <div class="save-option-title">Save to My Canvases</div>
                            <div class="save-option-sub">Stores to your account in the cloud</div>
                        </div>
                    </button>
                    <button id="saveDownloadBtn" class="save-option">
                        <i class="fa-solid fa-download"></i>
                        <div>
                            <div class="save-option-title">Download as PNG</div>
                            <div class="save-option-sub">Saves a copy to your device</div>
                        </div>
                    </button>
                </div>
            </div>
            <button id="authModalBtn" class="btn btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Login / Register
            </button>
        </div>
    </header>

    <div class="app-body">
        <aside class="sidebar-tools">
            <div class="tool-section">
                <h3>Tools</h3>
                <button id="toolBrush"  class="tool-btn active"><i class="fa-solid fa-paint-brush"></i> Brush</button>
                <button id="toolEraser" class="tool-btn"><i class="fa-solid fa-eraser"></i> Eraser</button>
                <button id="toolLine"   class="tool-btn"><i class="fa-solid fa-minus"></i> Line</button>
                <button id="toolRect"   class="tool-btn"><i class="fa-regular fa-square"></i> Rectangle</button>
                <button id="toolCircle" class="tool-btn"><i class="fa-regular fa-circle"></i> Circle</button>
            </div>

            <div class="tool-section">
                <h3>Style</h3>
                <div class="style-group">
                    <label for="colorPicker"><i class="fa-solid fa-palette"></i> Color</label>
                    <input type="color" id="colorPicker" value="#4f46e5">
                </div>
                <div class="style-group">
                    <label for="lineWidthRange">
                        <i class="fa-solid fa-sliders"></i> Thickness (<span id="thicknessVal">4</span>px)
                    </label>
                    <input type="range" id="lineWidthRange" min="2" max="30" value="4">
                </div>
            </div>

            <button id="clearBtn" class="btn btn-danger"><i class="fa-solid fa-trash-can"></i> Clear All</button>
        </aside>

        <main class="canvas-container">
            <canvas id="whiteboard"></canvas>
        </main>

        <!-- ── My Canvases Drawer ──────────────────────────────────────────────── -->
        <div id="canvasDrawer" class="canvas-drawer">
            <div class="drawer-header">
                <div class="drawer-title">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>My Canvases</span>
                </div>
                <button id="closeDrawerBtn" class="drawer-close-btn">&times;</button>
            </div>
            <button id="newCanvasBtn" class="btn btn-primary drawer-new-btn">
                <i class="fa-solid fa-plus"></i> New Canvas
            </button>
            <div id="canvasList" class="canvas-list">
                <p class="canvas-list-empty">Loading your canvases…</p>
            </div>
        </div>
        <div id="drawerBackdrop" class="drawer-backdrop"></div>
    </div>

    <!-- ── Auth Modal ──────────────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-card">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            <div class="modal-tabs">
                <button class="tab-btn active" id="tabLogin">Login</button>
                <button class="tab-btn" id="tabRegister">Register</button>
            </div>
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-login form-submit-btn">Sign In</button>
            </form>
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="Jane Doe">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary form-submit-btn">Create Account</button>
            </form>
        </div>
    </div>

    <!-- ── Share Modal ─────────────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal-card">
            <button class="close-modal" id="closeShareModalBtn">&times;</button>
            <h2 style="margin-bottom:8px; font-size:1.1rem; color:#1e293b;">Share Canvas</h2>
            <p style="font-size:0.85rem; color:#64748b; margin-bottom:20px;">
                Enter the email of the person you want to collaborate with.
            </p>
            <div class="input-group" style="margin-bottom:16px;">
                <label>Collaborator Email</label>
                <input type="email" id="shareEmail" placeholder="collaborator@example.com">
            </div>
            <button id="shareSubmitBtn" class="btn btn-primary form-submit-btn">
                <i class="fa-solid fa-paper-plane"></i> Send Invite
            </button>
            <p id="shareMsg" style="margin-top:12px; font-size:0.85rem; text-align:center;"></p>
        </div>
    </div>

    <script src="https://whiteboard-kjr.onrender.com/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
